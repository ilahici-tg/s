<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Benimle Çıkar Mısın? 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; 
        }

        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(214, 51, 108, 0.15);
            z-index: 10;
            width: 85%;
            max-width: 340px;
            min-height: 400px; /* Butonun kaçması için dikeyde alan açtık */
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #d6336c; font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; pointer-events: none; }
        p { color: #6a4c5b; font-size: 0.95rem; font-weight: 500; margin-bottom: 25px; pointer-events: none; }

        /* Butonlar İçin Sabit Alan */
        .btn-wrapper {
            width: 100%;
            height: 250px; /* Kaçış alanı */
            position: relative;
            margin-top: 10px;
        }

        button {
            width: 130px; /* Boyut sabitlendi */
            height: 45px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            position: absolute; /* Her iki buton da artık absolute */
        }

        #yes-btn {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            color: white;
            left: 50%;
            top: 20%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        #no-btn {
            background: #ffffff;
            color: #d6336c;
            border: 1px solid #ffb7c5;
            z-index: 20;
            left: 50%;
            top: 60%;
            transform: translate(-50%, -50%);
            /* Akıcı hareket */
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .petal {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 15px 0 15px 0;
            opacity: 0.7;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        #start-screen {
            position: fixed;
            inset: 0;
            background: #fecfef;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d6336c;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startExperience()">
        <h2>Hazırsan dokun... 🌸</h2>
    </div>

    <audio id="bg-music" loop>
        <source src="another_love.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <h1>Benimle Çıkar Mısın?</h1>
        <p>Gelecekteki en güzel günlerimiz için... 🌸</p>
        
        <div class="btn-wrapper" id="move-area">
            <button id="yes-btn">Evet</button>
            <button id="no-btn">Hayır</button>
        </div>
    </div>

    <script>
        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('bg-music').play();
            setInterval(createPetal, 400);
        }

        const noBtn = document.getElementById('no-btn');
        const area = document.getElementById('move-area');

        function moveButton() {
            // Kaçış alanı (wrapper) sınırları
            const areaW = area.offsetWidth;
            const areaH = area.offsetHeight;
            
            // Buton boyutları
            const btnW = noBtn.offsetWidth;
            const btnH = noBtn.offsetHeight;

            // Rastgele konum (Konteyner sınırları içinde)
            let newX = Math.random() * (areaW - btnW);
            let newY = Math.random() * (areaH - btnH);

            // Evet butonunun olduğu bölgeye çok yaklaşmasını engellemek için kontrol (isteğe bağlı)
            // Evet butonu genelde üst ortada olduğu için (y: 20%), 
            // Hayır butonunu biraz daha serbest bıraktık.

            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
            noBtn.style.transform = 'none'; // İlk baştaki ortalamayı iptal et
        }

        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(); });
        noBtn.addEventListener('mouseover', moveButton);

        document.getElementById('yes-btn').addEventListener('click', () => {
            document.querySelector('.card').innerHTML = `
                <h1 style="font-size: 3rem;">🌸</h1>
                <h1 style="margin-top:20px;">Seni Seviyorum!</h1>
                <p>Hazırlan, seni almaya geliyorum...</p>
            `;
            noBtn.style.display = 'none';
        });

        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.top = '-20px';
            petal.style.width = Math.random() * 10 + 8 + 'px';
            petal.style.height = '12px';
            petal.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 6000);
        }
    </script>
</body>
</html>
